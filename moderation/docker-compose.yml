version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: neomarket_moderation_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neomarket_moderation
    ports:
      - "5434:5432"  # другой порт, чтобы не конфликтовать с B2B (5433)
    volumes:
      - postgres_moderation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: neomarket_pgadmin_moderation
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neomarket.ru
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"  # другой порт, чтобы не конфликтовать с B2B (5050)
    depends_on:
      - postgres

  moderation-service:
    build: .
    container_name: neomarket_moderation
    ports:
      - "8001:8000"  # другой порт, чтобы не конфликтовать с B2B (8000)
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neomarket_moderation
      DB_USER: postgres
      DB_PASS: postgres
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/neomarket_moderation
      B2B_SERVICE_URL: http://b2b-service:8000  # ссылка на B2B сервис
    volumes:
      - .:/app
      - ./migrations:/app/migrations
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_moderation_data: